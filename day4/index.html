<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
</head>
<body>

    <h2 style="border: 30pt; text-decoration-color: rgb(181, 58, 58); background-color: rgb(159, 112, 197);">AI CHAT N</h2>

    <div id="chat"></div>

    <input id="ques" placeholder="Type Here....">
    <button onclick="askAI()" id="sendbtn" style="text-decoration-color: rgb(159, 70, 70); background-color: aqua;">Send</button>
    <button onclick="clearChat()" style="text-decoration-color: rgb(159, 70, 70); background-color: aqua;">Clr Chat</button>

    <script>
        async function askAI() {
            let btn = document.getElementById("sendbtn");
            btn.disabled = true;

            let q = document.getElementById("ques").value;

            let chat = document.getElementById("chat");

            if(!q.trim()) {
                btn.disabled=false;
                return;                                  // prevent empty input
            }

            chat.innerHTML += `<p><b>Me:</b> ${q}</p>`;            //show user message
            chat.scrollTop = chat.scrollHeight;

            let loadingId = "loading-" + Date.now();
            chat.innerHTML += `<p id="${loadingId}"><b>AI:</b> Thinking..... </p>`;
            chat.scrollTop = chat.scrollHeight;
        try{

            let res = await fetch(`http://127.0.0.1:8000/ask?q=${encodeURIComponent(q)}`);
            let data = await res.json()

            chat.innerHTML="";

            data.history.forEach(msg => {
                if(msg.user){
                    chat.innerHTML += `<p><b>Me:</b> ${msg.user}</p>`
                } else {    
                    chat.innerHTML += `<p><b>Me:</b> ${msg.ai}</p>`
                }
                
            });
           
            // document.getElementById(loadingId).innerHTML = `<b>AI:</b> ${data.answer}`;
            chat.scrollTop = chat.scrollHeight;
        } catch(err){
            
            document.getElementById(loadingId).innerHTML = `<b>AI:</b> Error Occured`;
        }

            document.getElementById("ques").value = "";
            btn.disabled=false;

        }
        function clearChat(){
            document.getElementById("chat").innerHTML = "";
        }
    </script>
    
</body>
</html>
